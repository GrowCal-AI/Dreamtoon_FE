<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0C29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302B63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2DD4BF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Glow effects -->
  <circle cx="300" cy="200" r="250" fill="url(#glowGradient)" opacity="0.4" />
  <circle cx="900" cy="450" r="200" fill="url(#glowGradient)" opacity="0.3" />

  <!-- Logo circle (left side) -->
  <circle cx="280" cy="315" r="140" fill="url(#logoGradient)" opacity="0.9" />

  <!-- Moon/Dream symbol in logo -->
  <path d="M 240 280 Q 250 260, 270 270 Q 290 280, 280 300 Q 270 320, 250 310 Q 230 300, 240 280"
        fill="#FFFFFF" opacity="0.95"/>

  <!-- Stars around logo -->
  <circle cx="200" cy="380" r="4" fill="#FFFAB5" opacity="0.9" />
  <circle cx="360" cy="260" r="5" fill="#FFFAB5" opacity="0.9" />
  <circle cx="340" cy="380" r="3" fill="#FFFAB5" opacity="0.9" />
  <circle cx="220" cy="250" r="3.5" fill="#FFFAB5" opacity="0.9" />

  <!-- Sparkles -->
  <path d="M 280 200 L 283 208 L 291 211 L 283 214 L 280 222 L 277 214 L 269 211 L 277 208 Z"
        fill="#FFFAB5" opacity="0.85"/>
  <path d="M 320 350 L 322 356 L 328 358 L 322 360 L 320 366 L 318 360 L 312 358 L 318 356 Z"
        fill="#FFFAB5" opacity="0.85"/>

  <!-- Main title -->
  <text x="480" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">
    Dreamics.ai
  </text>

  <!-- Subtitle -->
  <text x="480" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#E0E0E0">
    AI 꿈 분석 &amp; 웹툰 생성 플랫폼
  </text>

  <!-- Feature badges -->
  <g transform="translate(480, 380)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="160" height="48" rx="24" fill="#8B5CF6" opacity="0.2" />
    <rect x="2" y="2" width="156" height="44" rx="22" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6" />
    <text x="80" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E0E0E0" text-anchor="middle">
      AI 꿈 분석
    </text>

    <!-- Badge 2 -->
    <rect x="180" y="0" width="160" height="48" rx="24" fill="#2DD4BF" opacity="0.2" />
    <rect x="182" y="2" width="156" height="44" rx="22" fill="none" stroke="#2DD4BF" stroke-width="1" opacity="0.6" />
    <text x="260" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E0E0E0" text-anchor="middle">
      4컷 웹툰
    </text>

    <!-- Badge 3 -->
    <rect x="360" y="0" width="160" height="48" rx="24" fill="#8B5CF6" opacity="0.2" />
    <rect x="362" y="2" width="156" height="44" rx="22" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6" />
    <text x="440" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E0E0E0" text-anchor="middle">
      감정 인식
    </text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#A0A0A0" text-anchor="middle">
    무의식의 세계를 탐험하세요
  </text>

  <!-- Decorative elements (small stars scattered) -->
  <circle cx="750" cy="150" r="2" fill="#FFFAB5" opacity="0.5" />
  <circle cx="950" cy="200" r="2.5" fill="#FFFAB5" opacity="0.5" />
  <circle cx="1050" cy="350" r="2" fill="#FFFAB5" opacity="0.5" />
  <circle cx="550" cy="500" r="2" fill="#FFFAB5" opacity="0.5" />
  <circle cx="850" cy="520" r="2.5" fill="#FFFAB5" opacity="0.5" />
</svg>
